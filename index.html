<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sebbi/web • Oficial</title>
    
    <link rel="icon" type="image/png" href="logo.png..png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #030303;
            --text-color: #ffffff;
            --border-color: #2a2a2a;
            --polished-gradient: linear-gradient(135deg, #181818 0%, #111 50%, #181818 100%);
            --event-color: #ff3e3e;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow-x: hidden; 
        }

        /* --- EFECTO DE EVENTO --- */
        #event-container {
            display: none;
            width: 100%;
            max-width: 450px;
            background: rgba(255, 62, 62, 0.05);
            border: 1px solid rgba(255, 62, 62, 0.2);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 62, 62, 0.2); }
            70% { box-shadow: 0 0 0 10px rgba(255, 62, 62, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 62, 62, 0); }
        }

        .event-title { color: var(--event-color); font-weight: 800; letter-spacing: 5px; font-size: 1.2rem; margin-bottom: 5px; }
        .event-link { color: #888; font-size: 0.7rem; text-decoration: none; display: block; margin-bottom: 15px; word-break: break-all; }
        .timer { font-family: monospace; font-size: 1.5rem; color: #fff; background: #111; padding: 10px; border-radius: 8px; display: inline-block; }

        /* --- LOADER --- */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #030303; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
            transition: opacity 0.5s ease;
        }
        .loader-text { font-family: monospace; font-size: 0.7rem; letter-spacing: 3px; margin-bottom: 15px; color: #444; }
        .progress-container { width: 150px; height: 1px; background: #111; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: #fff; animation: load 1.2s ease-in-out forwards; }
        @keyframes load { 0% { width: 0%; } 100% { width: 100%; } }

        /* --- INTERFAZ Y BOTONES CON BRILLO --- */
        header, .links-container, .footer { opacity: 0; transform: translateY(20px); animation: fadeInUp 0.8s ease forwards; }
        header { text-align: center; margin-bottom: 40px; animation-delay: 1.5s; }
        header h1 { font-size: 3rem; font-weight: 300; margin: 0; letter-spacing: -1px; }
        header span { color: #555; }
        .sub-title { font-size: 0.7rem; letter-spacing: 4px; color: #444; text-transform: uppercase; margin-top: 10px; }

        .links-container { width: 100%; max-width: 450px; animation-delay: 1.7s; }

        .link-card {
            background: var(--polished-gradient);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 18px 25px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: white;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            overflow: hidden; /* Importante para el brillo */
        }

        /* EFECTO DE BRILLO (SHIMMER) RE-ACTIVADO */
        .link-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: all 0.6s;
        }

        .link-card:hover {
            border-color: #444;
            background: linear-gradient(135deg, #222 0%, #1a1a1a 50%, #222 100%);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.07);
            transform: translateY(-2px) scale(1.01);
        }

        .link-card:hover::before {
            left: 100%;
        }

        .link-card i { font-size: 1.2rem; width: 30px; }
        .link-card span { flex-grow: 1; margin-left: 10px; font-size: 0.95rem; }
        .link-card .arrow { color: #333; font-size: 0.8rem; }

        .secret-card { background: rgba(40, 40, 40, 0.2); border: 1px dashed #444; margin-top: 30px; }
        .footer { margin-top: 40px; color: #2a2a2a; font-size: 0.7rem; text-align: center; animation-delay: 1.9s; }
        .invisible-counter { display: none; }

        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-text">SINCRONIZANDO SISTEMA...</div>
        <div class="progress-container"><div class="progress-bar"></div></div>
    </div>

    <div id="event-container">
        <div class="event-title">EVENT ABUSE</div>
        <a href="https://www.roblox.com/games/93796289838633/MATA-A-LOS-THERIANS" target="_blank" class="event-link">https://www.roblox.com/games/93796289838633/MATA-A-LOS-THERIANS</a>
        <div id="countdown" class="timer">00d 00h 00m 00s</div>
    </div>

    <header>
        <h1>sebbi<span>/</span>web</h1>
        <div class="sub-title">LINKS OFICIALES</div>
    </header>

    <div class="links-container">
        <a href="https://www.youtube.com/@Sebbioff" target="_blank" class="link-card">
            <i class="fab fa-youtube"></i><span>YouTube</span><i class="fas fa-chevron-right arrow"></i>
        </a>
        <a href="https://www.tiktok.com/@kairhryensbaoe?lang=en" target="_blank" class="link-card">
            <i class="fab fa-tiktok"></i><span>TikTok</span><i class="fas fa-chevron-right arrow"></i>
        </a>
        <a href="https://www.roblox.com/users/1800241254/profile" target="_blank" class="link-card">
            <i class="fas fa-gamepad"></i><span>Roblox</span><i class="fas fa-chevron-right arrow"></i>
        </a>
        <a href="https://discord.gg/EbkacuHY" target="_blank" class="link-card">
            <i class="fab fa-discord" style="color: #5865F2;"></i><span>Discord</span><i class="fas fa-chevron-right arrow"></i>
        </a>
        <div style="border-bottom: 1px solid #1a1a1a; margin: 30px 0;"></div>
        <a href="mailto:colmenares0910@gmail.com" class="link-card">
            <i class="far fa-envelope"></i><span>colmenares0910@gmail.com</span>
        </a>
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSfQl3RBotbTP6BGGSRB_Rj6jwcSRXmCROpZ0lF-zIg_VLXihA/viewform" target="_blank" class="link-card secret-card">
            <i class="fas fa-user-secret"></i><span>Enviar mensaje anónimo...</span><i class="fas fa-lock arrow"></i>
        </a>
    </div>

    <div class="footer">
        © 2026 sebbi/web
        <img src="https://hits.seeyoufarm.com/api/count/incr/badge.svg?url=https%3A%2F%2Fcolmenares0910-code.github.io%2Fsebbi-web%2F&count_bg=%2379C83D&title_bg=%23555555&icon=&icon_color=%23E7E7E7&title=hits&edge_flat=false" class="invisible-counter"/>
    </div>

    <script>
        // LÓGICA DEL EVENTO
        function updateEvent() {
            const now = new Date();
            const eventContainer = document.getElementById('event-container');
            const countdownEl = document.getElementById('countdown');

            // Fin: Próximo sábado 3 PM
            let targetDate = new Date();
            targetDate.setDate(now.getDate() + (6 - now.getDay() + 7) % 7);
            targetDate.setHours(15, 0, 0, 0);

            if (now > targetDate && now.getDay() === 6) {
                targetDate.setDate(targetDate.getDate() + 7);
            }

            // Mostrar si es horario de evento
            eventContainer.style.display = 'block'; 
            
            const diff = targetDate - now;
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            countdownEl.innerHTML = `${d}d ${h}h ${m}m ${s}s`;
        }

        setInterval(updateEvent, 1000);
        updateEvent();

        // LOADER
        setTimeout(() => {
            const loader = document.getElementById('loader');
            loader.style.opacity = '0';
            setTimeout(() => {
                loader.style.display = 'none';
                document.body.style.overflow = 'auto'; 
            }, 500);
        }, 1500);
    </script>
</body>
</html>
