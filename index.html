<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sebbi/web • Oficial</title>
    
    <link rel="icon" type="image/png" href="logo.png..png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #030303;
            --text-color: #ffffff;
            --border-color: #2a2a2a;
            --polished-gradient: linear-gradient(135deg, #181818 0%, #111 50%, #181818 100%);
            --accent-blue: #0096ff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow-x: hidden; 
        }

        /* --- LOADER --- */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #030303; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
            transition: opacity 0.5s ease;
        }
        .loader-text { font-family: monospace; font-size: 0.7rem; letter-spacing: 3px; margin-bottom: 15px; color: #444; }
        .progress-container { width: 150px; height: 1px; background: #111; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: #fff; animation: load 1.2s ease-in-out forwards; }
        @keyframes load { 0% { width: 0%; } 100% { width: 100%; } }

        /* --- TEMPORIZADOR --- */
        .countdown-wrapper {
            opacity: 0;
            transform: translateY(-10px);
            animation: fadeInDown 0.8s ease forwards 1.5s;
            text-align: center;
            margin-bottom: 10px;
        }
        .countdown-label { font-size: 0.6rem; letter-spacing: 3px; color: var(--accent-blue); text-transform: uppercase; margin-bottom: 5px; font-weight: bold; }
        #main-timer { font-family: 'Courier New', Courier, monospace; font-size: 1.2rem; color: #fff; background: rgba(255,255,255,0.03); padding: 5px 15px; border-radius: 5px; border: 1px solid var(--border-color); display: inline-block; }

        /* --- GALERÍA --- */
        #gallery-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 10000; flex-direction: column;
            align-items: center; padding: 40px 20px; overflow-y: auto;
        }
        .gallery-content { width: 100%; max-width: 500px; text-align: center; }
        .temp-img { width: 100%; border-radius: 12px; margin-bottom: 20px; border: 1px solid #222; display: none; }
        .close-gallery { background: #fff; color: #000; padding: 12px 25px; border-radius: 50px; cursor: pointer; font-weight: bold; margin-bottom: 30px; border: none; font-size: 0.8rem; }
        #no-photos-msg { padding: 40px 20px; border: 1px dashed #222; border-radius: 15px; margin-top: 20px; }

        /* --- INTERFAZ BASE --- */
        header, .links-container, .footer, .system-log { opacity: 0; transform: translateY(20px); animation: fadeInUp 0.8s ease forwards; }
        header { text-align: center; margin-bottom: 40px; animation-delay: 1.2s; }
        header h1 { font-size: 3.5rem; font-weight: 300; margin: 0; letter-spacing: -2px; }
        header span { color: #555; }
        .sub-title { font-size: 0.7rem; letter-spacing: 6px; color: #444; text-transform: uppercase; margin-top: 10px; }

        .links-container { width: 100%; max-width: 450px; animation-delay: 1.4s; }
        .link-card {
            background: var(--polished-gradient); border: 1px solid var(--border-color);
            border-radius: 12px; padding: 18px 25px; margin-bottom: 12px;
            display: flex; align-items: center; text-decoration: none; color: white;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative; overflow: hidden; cursor: pointer;
        }
        .link-card:hover { border-color: #444; background: #1a1a1a; transform: translateY(-2px); }
        .link-card i { font-size: 1.2rem; width: 30px; }
        .link-card span { flex-grow: 1; margin-left: 10px; font-size: 0.95rem; }

        .secret-card { background: rgba(40, 40, 40, 0.2); border: 1px dashed #444; margin-top: 25px; }
        .temp-card { background: rgba(0, 150, 255, 0.05); border: 1px solid rgba(0, 150, 255, 0.15); margin-top: 12px; }
        
        .system-log {
            width: 100%; max-width: 450px; background: rgba(0, 0, 0, 0.4);
            border-left: 2px solid var(--accent-blue); padding: 10px 15px; margin-top: 25px;
            font-family: 'monospace'; font-size: 0.6rem; color: #0096ff;
            height: 45px; overflow: hidden; display: flex; flex-direction: column-reverse;
            animation-delay: 1.6s;
        }

        .footer { margin-top: 50px; color: #222; font-size: 0.65rem; text-align: center; animation-delay: 1.8s; }
        .invisible-counter { display: none; }

        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInDown { to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-text">INICIANDO INTERFAZ...</div>
        <div class="progress-container"><div class="progress-bar"></div></div>
    </div>

    <div class="countdown-wrapper">
        <div class="countdown-label">Tiempo Restante</div>
        <div id="main-timer">00d 00h 00m 00s</div>
    </div>

    <div id="gallery-overlay">
        <button class="close-gallery" onclick="toggleGallery()">CERRAR GALERÍA</button>
        <div class="gallery-content">
            <h2 style="letter-spacing: 5px; font-size: 0.8rem; color: #444; margin-bottom: 30px;">SISTEMA DE ARCHIVOS</h2>
            
            <img src="https://i.postimg.cc/gktq3b99/image.png" class="temp-img" data-expire="2026-12-31T23:59">
            
            <img src="https://i.postimg.cc/Hx3h03bB/flux-2-max-20251222-b-Genera-un-texto-con.jpg" class="temp-img" data-expire="2026-12-31T23:59">
            
            <div id="no-photos-msg" style="display:none;">
                <i class="fas fa-ghost" style="font-size: 2rem; color: #222; margin-bottom: 10px;"></i>
                <p style="color: #444; font-size: 0.9rem; letter-spacing: 1px;">EL SISTEMA ESTÁ VACÍO...</p>
            </div>
        </div>
    </div>

    <header>
        <h1>sebbi<span>/</span>web</h1>
        <div class="sub-title">LINKS OFICIALES</div>
    </header>

    <div class="links-container">
        <a href="https://www.youtube.com/@Sebbioff" target="_blank" class="link-card">
            <i class="fab fa-youtube"></i><span>YouTube</span>
        </a>
        <a href="https://www.tiktok.com/@kairhryensbaoe" target="_blank" class="link-card">
            <i class="fab fa-tiktok"></i><span>TikTok</span>
        </a>
        <a href="https://www.roblox.com/users/1800241254/profile" target="_blank" class="link-card">
            <i class="fas fa-gamepad"></i><span>Roblox</span>
        </a>
        <a href="https://discord.gg/EbkacuHY" target="_blank" class="link-card">
            <i class="fab fa-discord" style="color: #5865F2;"></i><span>Discord</span>
        </a>
        
        <div style="border-bottom: 1px solid #111; margin: 25px 0;"></div>
        
        <a href="mailto:colmenares0910@gmail.com" class="link-card">
            <i class="far fa-envelope"></i><span>Email de Contacto</span>
        </a>

        <a href="https://docs.google.com/forms/d/e/1FAIpQLSfQl3RBotbTP6BGGSRB_Rj6jwcSRXmCROpZ0lF-zIg_VLXihA/viewform" target="_blank" class="link-card secret-card">
            <i class="fas fa-user-secret"></i><span>Mensaje Anónimo</span>
        </a>

        <div class="link-card temp-card" onclick="toggleGallery()">
            <i class="far fa-images" style="color: var(--accent-blue);"></i>
            <span>Archivos Fotográficos</span>
            <i class="fas fa-chevron-right" style="color: #333; font-size: 0.7rem; margin-left: auto;"></i>
        </div>

        <div class="system-log">
            <div id="log-text"></div>
        </div>
    </div>

    <div class="footer">
        © 2026 SEBBI WEB • SYSTEM ACTIVE
        <img src="https://hits.seeyoufarm.com/api/count/incr/badge.svg?url=https%3A%2F%2Fcolmenares0910-code.github.io%2Fsebbi-web%2F&count_bg=%23030303&title_bg=%23030303&icon=&icon_color=%23E7E7E7&title=hits&edge_flat=false" class="invisible-counter"/>
    </div>

    <script>
        function toggleGallery() {
            const g = document.getElementById('gallery-overlay');
            const isOpening = g.style.display !== 'flex';
            g.style.display = isOpening ? 'flex' : 'none';
            document.body.style.overflow = isOpening ? 'hidden' : 'auto';
        }

        const logText = document.getElementById('log-text');
        const messages = ["> SYSTEM_READY", "> ENCRYPTION_ACTIVE", "> ASSETS_LOADED", "> PORT_8080_OPEN", "> CACHE_CLEARED", "> STATUS: OPTIMIZED"];
        let logIdx = 0;
        setInterval(() => {
            const line = document.createElement('div');
            line.textContent = messages[logIdx];
            logText.appendChild(line);
            if (logText.childNodes.length > 3) logText.removeChild(logText.firstChild);
            logIdx = (logIdx + 1) % messages.length;
        }, 2500);

        function updateMainTimer() {
            const now = new Date();
            const target = new Date(2026, 9, 9, 0, 0, 0);
            const diff = target - now;
            if (diff <= 0) { document.getElementById('main-timer').innerHTML = "EVENTO INICIADO"; return; }
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            document.getElementById('main-timer').innerHTML = `${d}d ${h.toString().padStart(2, '0')}h ${m.toString().padStart(2, '0')}m ${s.toString().padStart(2, '0')}s`;
        }
        setInterval(updateMainTimer, 1000);
        updateMainTimer();

        function checkImages() {
            const now = new Date();
            const images = document.querySelectorAll('.temp-img');
            let fotosActivas = 0;
            images.forEach(img => {
                const expireAt = new Date(img.getAttribute('data-expire'));
                if (now < expireAt) { img.style.display = 'block'; fotosActivas++; } else { img.style.display = 'none'; }
            });
            document.getElementById('no-photos-msg').style.display = (fotosActivas === 0) ? 'block' : 'none';
        }
        setInterval(checkImages, 5000);
        checkImages();

        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => { loader.style.display = 'none'; }, 500);
            }, 1000);
        });
    </script>
</body>
</html>
