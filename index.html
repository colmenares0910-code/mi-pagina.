<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sebbi/web • Oficial</title>
    
    <link rel="icon" type="image/png" href="logo.png..png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #030303;
            --text-color: #ffffff;
            --border-color: #2a2a2a;
            --polished-gradient: linear-gradient(135deg, #181818 0%, #111 50%, #181818 100%);
            --event-color: #ff3e3e;
            --online-color: #2ecc71;
            --accent-blue: #0096ff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
            cursor: none; /* Ocultamos el cursor para usar el personalizado */
        }

        /* --- 2. CURSOR PERSONALIZADO --- */
        #custom-cursor {
            width: 20px; height: 20px;
            background: var(--accent-blue);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 99999;
            mix-blend-mode: screen;
            box-shadow: 0 0 15px var(--accent-blue), 0 0 30px var(--accent-blue);
            transition: transform 0.1s ease;
            transform: translate(-50%, -50%);
        }

        /* --- 5. PARTÍCULAS DE FONDO --- */
        #particles-js {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none;
        }

        /* --- LOADER --- */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #030303; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
            transition: opacity 0.5s ease; cursor: default;
        }
        .loader-text { font-family: monospace; font-size: 0.7rem; letter-spacing: 3px; margin-bottom: 15px; color: #444; }
        .progress-container { width: 150px; height: 1px; background: #111; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: #fff; animation: load 1.2s ease-in-out forwards; }
        @keyframes load { 0% { width: 0%; } 100% { width: 100%; } }

        /* --- 1. EFECTO GLITCH TÍTULO --- */
        .glitch {
            font-size: 3rem; font-weight: 300; position: relative;
            animation: glitch-anim 4s infinite;
        }
        @keyframes glitch-anim {
            0%, 90%, 100% { transform: none; opacity: 1; }
            92% { transform: skewX(10deg); opacity: 0.8; color: var(--accent-blue); }
            95% { transform: skewX(-10deg); opacity: 0.9; color: #ff00c1; }
        }

        /* --- 3. TARJETA DE VISITA --- */
        .user-info-card {
            font-family: monospace; font-size: 0.6rem; color: #444;
            margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px;
        }

        /* --- LIVE STATUS --- */
        .status-badge {
            display: flex; align-items: center; background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color); padding: 8px 15px; border-radius: 50px;
            margin-bottom: 25px; font-size: 0.75rem; opacity: 0;
            animation: fadeIn 1s ease forwards 2s;
        }
        .status-dot { width: 8px; height: 8px; background-color: var(--online-color); border-radius: 50%; margin-right: 10px; box-shadow: 0 0 10px var(--online-color); animation: blink 1.5s infinite; }

        /* --- LINKS --- */
        .links-container { width: 100%; max-width: 450px; animation: fadeInUp 0.8s ease forwards 1.7s; opacity: 0; }
        
        /* --- 4. BOTONES NEON --- */
        .link-card {
            background: var(--polished-gradient); border: 1px solid var(--border-color);
            border-radius: 12px; padding: 18px 25px; margin-bottom: 12px;
            display: flex; align-items: center; text-decoration: none; color: white;
            transition: all 0.3s ease; position: relative; overflow: hidden;
        }
        .link-card:hover { 
            border-color: var(--accent-blue); 
            box-shadow: 0 0 20px rgba(0, 150, 255, 0.4); 
            transform: scale(1.02);
        }

        .system-log {
            width: 100%; max-width: 450px; background: rgba(0, 0, 0, 0.4);
            border-left: 2px solid var(--accent-blue); padding: 10px 15px; margin-top: 25px;
            font-family: 'monospace'; font-size: 0.6rem; color: #0096ff;
            height: 45px; overflow: hidden; display: flex; flex-direction: column-reverse;
        }

        .footer { margin-top: 30px; color: #222; font-size: 0.65rem; text-align: center; }

        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* Ajuste para móviles: ocultar cursor personalizado */
        @media (max-width: 768px) {
            #custom-cursor { display: none; }
            body { cursor: auto; }
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>
    <canvas id="particles-js"></canvas>

    <div id="loader">
        <div class="loader-text">SINCRONIZANDO SISTEMA...</div>
        <div class="progress-container"><div class="progress-bar"></div></div>
    </div>

    <div class="user-info-card" id="user-info">
        Detecting session... [ID: <span id="session-id"></span>]
    </div>

    <div class="status-badge">
        <div class="status-dot"></div>
        <span>ACTUALMENTE: <b>?</b></span>
    </div>

    <header>
        <h1 class="glitch">sebbi<span>/</span>web</h1>
        <div style="font-size: 0.7rem; color: #444; letter-spacing: 4px;">SYSTEM_V3.0</div>
    </header>

    <div class="links-container">
        <a href="https://www.youtube.com/@Sebbioff" target="_blank" class="link-card">
            <i class="fab fa-youtube"></i><span>YouTube</span>
        </a>
        <a href="https://www.tiktok.com/@kairhryensbaoe" target="_blank" class="link-card">
            <i class="fab fa-tiktok"></i><span>TikTok</span>
        </a>
        <a href="https://discord.gg/EbkacuHY" target="_blank" class="link-card">
            <i class="fab fa-discord"></i><span>Discord</span>
        </a>

        <div class="system-log">
            <div id="log-text"></div>
        </div>
    </div>

    <div class="footer">
        © 2026 SEBBI WEB • SYSTEM ACTIVE
    </div>

    <script>
        // 2. Lógica del Cursor
        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // 3. Simulación ID de Sesión
        document.getElementById('session-id').innerText = Math.random().toString(36).substring(7).toUpperCase();

        // System Log
        const logText = document.getElementById('log-text');
        const messages = ["> ACCESS_GRANTED", "> SCANNING_PORT...", "> ENCRYPTING...", "> STABLE_CONNECTION"];
        let logIdx = 0;
        setInterval(() => {
            const line = document.createElement('div');
            line.textContent = messages[logIdx];
            logText.appendChild(line);
            if (logText.childNodes.length > 3) logText.removeChild(logText.firstChild);
            logIdx = (logIdx + 1) % messages.length;
        }, 2000);

        // 5. Partículas Simples
        const canvas = document.getElementById('particles-js');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];
        for(let i=0; i<50; i++) {
            particles.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2});
        }
        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "rgba(0, 150, 255, 0.2)";
            particles.forEach(p => {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
                p.y -= 0.5; if(p.y < 0) p.y = canvas.height;
            });
            requestAnimationFrame(draw);
        }
        draw();

        // Loader
        window.addEventListener('load', () => {
            setTimeout(() => { document.getElementById('loader').style.opacity = '0'; }, 1000);
        });
    </script>
</body>
</html>
